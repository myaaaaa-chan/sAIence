<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="200" height="230">
  <!--
    saience 縦型ロゴ（ライト背景向け・スプラッシュ用）
    "AI" をサイズで強調、"saien"=菜園グループ、"ce" フェード
  -->
  <defs>
    <linearGradient id="vl-pot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="vl-leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="vl-ai" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="vl-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#059669" flood-opacity="0.2"/>
    </filter>
    <filter id="vl-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="vl-clip">
      <rect x="20" y="0" width="160" height="160"/>
    </clipPath>
  </defs>

  <!-- シンボル（中央揃え・scale 0.8） -->
  <g clip-path="url(#vl-clip)">
    <g transform="translate(20, 0) scale(0.8)">
      <path d="M50 170 Q48 148 50 128 L150 128 Q152 148 150 170 Q126 175 100 175 Q74 175 50 170Z"
            fill="url(#vl-pot)" filter="url(#vl-shadow)"/>
      <rect x="40" y="118" width="120" height="16" rx="8" fill="#059669"/>
      <rect x="44" y="118" width="112" height="6" rx="4" fill="#34D399" opacity="0.55"/>
      <ellipse cx="100" cy="128" rx="54" ry="7" fill="#065F46" opacity="0.3"/>
      <g stroke="#059669" stroke-width="1" fill="none" opacity="0.25" stroke-linecap="round">
        <line x1="72" y1="130" x2="70" y2="168"/>
        <line x1="100" y1="130" x2="100" y2="172"/>
        <line x1="128" y1="130" x2="130" y2="168"/>
      </g>
      <path d="M100 126 Q97 106 99 82 Q100 65 100 48"
            stroke="#10B981" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M99 100 Q72 88 60 60 Q58 40 80 42 Q97 44 99 100Z" fill="#6EE7B7" opacity="0.75"/>
      <path d="M101 82 Q132 70 144 44 Q146 24 124 26 Q108 28 101 82Z" fill="#6EE7B7" opacity="0.75"/>
      <path d="M99 108 Q68 96 54 66 Q52 44 74 46 Q94 48 99 108Z" fill="url(#vl-leaf)" opacity="0.95"/>
      <path d="M101 90 Q130 76 144 48 Q146 28 124 30 Q106 32 101 90Z" fill="url(#vl-leaf)" opacity="0.95"/>
      <path d="M99 108 Q76 90 66 68" stroke="white" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round"/>
      <path d="M101 90 Q122 74 132 52" stroke="white" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round"/>
      <circle cx="100" cy="48" r="14" fill="#059669" opacity="0.15" filter="url(#vl-glow)"/>
      <circle cx="100" cy="48" r="7" fill="#059669" filter="url(#vl-shadow)"/>
      <circle cx="100" cy="48" r="3" fill="white"/>
    </g>
  </g>

  <!-- 区切り線 -->
  <line x1="40" y1="168" x2="160" y2="168" stroke="#D1FAE5" stroke-width="1"/>

  <!-- ワードマーク: AI を大きく、s/en を中、ce を小さくフェード -->
  <text x="100" y="204" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        text-anchor="middle" dominant-baseline="alphabetic">
    <tspan font-size="30" font-weight="300" fill="#065F46">s</tspan>
    <tspan font-size="44" font-weight="800" fill="url(#vl-ai)" filter="url(#vl-glow)">AI</tspan>
    <tspan font-size="30" font-weight="300" fill="#065F46">en</tspan>
    <tspan font-size="25" font-weight="200" fill="#6EE7B7" opacity="0.5">ce</tspan>
  </text>

  <text x="100" y="221" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9.5" font-weight="400" fill="#059669" text-anchor="middle"
        letter-spacing="3" opacity="0.7">AI GARDEN ASSISTANT</text>
</svg>
